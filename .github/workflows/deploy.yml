name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.CPANEL_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      # rsync transfers local repo files to the server — only changed files,
      # skipping .git, GitHub Actions config, and dev-only files.
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.hintrc' \
            --exclude='.cpanel.yml' \
            --exclude='README.md' \
            ./ ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:~/public_html/
